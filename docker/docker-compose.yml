networks:
  mcp-net:
    external: true

services:
  fastmcp-edb96:
    networks:
      - mcp-net
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: fastmcp-edb96:local
    container_name: fastmcp-edb96
    restart: unless-stopped
    ports:
      - "8086:8080"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=64m
    volumes:
      - ../config:/app/config:ro
      - ../policy:/app/policy:ro
      - mcp-audit-log:/var/log/mcp
    env_file:
      - ../.env
    environment:
      FASTMCP_CONFIG_PATH: /app/config/instances.yaml
      FASTMCP_POLICY_PATH: /app/config/runtime-policy.yaml
      FASTMCP_RATE_LIMIT_PATH: /app/config/rate-limit.yaml
      FASTMCP_HOST: 0.0.0.0
      FASTMCP_PORT: 8080
      FASTMCP_LOG_LEVEL: INFO
      FASTMCP_STATELESS_HTTP: "true"
      FASTMCP_MASK_ERROR_DETAILS: "true"
      FASTMCP_RATE_LIMIT_BACKEND: ${FASTMCP_RATE_LIMIT_BACKEND:-redis}
      FASTMCP_REDIS_URL: redis://fastmcp-redis:6379
      FASTMCP_REDIS_NAMESPACE: ${FASTMCP_REDIS_NAMESPACE:-mcp:ratelimit}
      FASTMCP_TOOL_ENABLE_FLAGS_JSON: ${FASTMCP_TOOL_ENABLE_FLAGS_JSON:-}
      FASTMCP_INSTANCE_TOOL_ENABLE_FLAGS_JSON: ${FASTMCP_INSTANCE_TOOL_ENABLE_FLAGS_JSON:-}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  mcp-audit-log:
