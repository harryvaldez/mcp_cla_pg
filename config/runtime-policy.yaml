write_mode_default: deny
allowed_write_tools:
  - hypopg_create_index
  - hypopg_drop_index
  - hypopg_reset
  - hypopg_get_indexdef
  - hypopg_list_indexes
blocked_sql_patterns:
  - "(?i)\\b(drop|alter|truncate|create)\\b"
  - "(?i)\\b(pg_read_file|pg_write_file|pg_sleep)\\b"
  - "(?i)\\b(CREATE\\s+(OR\\s+REPLACE\\s+)?(PACKAGE|TYPE\\s+BODY|SYNONYM|DIRECTORY))\\b"
max_result_rows: 5000
max_query_duration_ms: 15000
instance_enable_flags:
  primary: true
  secondary: true
tool_enable_flags:
  get_slow_statements: true
  blocking_sessions: true
  analyze_data_model: true
  extract_schema_model: true
  analyze_constraints_and_fks: true
  analyze_normalization: true
  analyze_index_statistics: true
  analyze_3nf_and_decomposition: true
  hypopg_create_virtual_indexes: true
  hypopg_explain_with_virtual: true
  hypopg_find_optimal_indexes: true
  exec_query: true
  analyze_table: true
  check_table_bloat: true
  check_table_wraparound: true
  check_table_statistics: true
  check_index_health: true
  list_objects: true
  list_tables: true
  list_indexes: true
  list_views: true
  list_objects_by_type: true
  analyze_sett_sec: true
  check_db_parameters: true
  compute_db_metrics: true
  analyze_db_security: true
instance_tool_enable_flags: {}
allowed_tools: {}
# Authentication configuration (auth section)
auth:
  auth_mode: disabled
  # Okta OAuth (optional — active when auth_mode=okta)
  okta_read_scopes:
    - mcp:read
  okta_write_scopes:
    - mcp:write
  # Okta group-based access (groups claim in token takes priority over scopes)
  okta_read_groups:
    - mcp-readers
  okta_write_groups:
    - mcp-writers
  # Configurable restricted tool suffix lists for read-group/read-privilege callers.
  # HypoPG tools create/modify session-level virtual indexes and are excluded for read callers.
  okta_read_restricted_tool_suffixes:
    - _pg96_hypopg_create_virtual_indexes
    - _pg96_hypopg_explain_with_virtual
    - _pg96_hypopg_find_optimal_indexes
  # Cross-session inspection tools expose other users' sessions and are excluded for read callers.
  okta_cross_session_tool_suffixes:
    - _pg96_blocking_sessions
