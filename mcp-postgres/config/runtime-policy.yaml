write_mode_default: deny
allowed_write_tools: []
blocked_sql_patterns:
  - "(?i)\\b(drop|alter|truncate|create)\\b"
  - "(?i)\\b(pg_read_file|pg_write_file|pg_sleep)\\b"
  - "(?i)\\b(CREATE\\s+(OR\\s+REPLACE\\s+)?(PACKAGE|TYPE\\s+BODY|SYNONYM|DIRECTORY))\\b"
max_result_rows: 5000
max_query_duration_ms: 15000
instance_enable_flags:
  primary: true
  secondary: true
tool_enable_flags: {}
instance_tool_enable_flags: {}
allowed_tools: {}
